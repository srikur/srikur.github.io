baseURL = 'https://srikur.github.io/'
languageCode = 'en-us'
title = "srikur's dev page"
theme = 'loveit'

hasCJKLanguage = false
paginate = 12
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

# Author config
[author]
  name = "srikur"
  email = ""
  link = "/"

# Menu config
[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    # you can add extra information before the name (HTML format is supported), such as icons
    pre = ""
    # you can add extra information after the name (HTML format is supported), such as icons
    post = ""
    name = "Posts"
    url = "/posts/"
    # title will be shown when you hover on this menu link
    title = "View all posts"

[params]
  title = "srikur's dev page"
  description = "Blog posts by Srikur"
  images = ["/logo.png"]

[params.header]
  desktopMode = "fixed"
  mobileMode = "auto"
  [params.header.title]
    logo = ""
    name = "srikur"
    pre = ""
    post = ""
    typeit = false

[params.social]
  GitHub = "srikur"
  Twitter = "SrikurKanu"
  Linkedin = "srikur"

[params.home]
  rss = 10
  [params.home.profile]
    enable = true
    gravatarEmail = ""
    avatarURL = "/images/avatar_square.png"
    title = ""
    subtitle = "Hi! I am a Software Engineer"
    typeit = false
    social = true
    disclaimer = ""
  [params.home.posts]
    enable = true
    paginate = 6
    defaultHiddenFromHomePage = false

[params.page]
  ruby = true
  fraction = true
  linkToMarkdown = true

  [params.page.toc]
    enable = true
    keepStatic = false
    auto = true

  [params.page.code]
    copy = true
    maxShownLines = 100

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = true
    noClasses = false