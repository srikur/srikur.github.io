<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Untitled</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700">
    <link rel="stylesheet" href="assets/fonts/font-awesome.min.css">
    <link rel="stylesheet" href="assets/fonts/ionicons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.6.1/css/pikaday.min.css">
    <link rel="stylesheet" href="assets/css/list.css">
    <link rel="stylesheet" href="assets/css/nlp.css">
</head>

<body class="nlp">
    <h1>NLP</h1><div style="text-align: center">

    <label>Enter Variables</label><br>
    <input class="nlp" type="text" id="varsInput"
           placeholder="Example: var1" oninput="checkVariable(); return false"> 
    <button type="button" onclick="newVariable()" class="nlp" id="addVar"> 
        <img src="assets/img/plus.png">
    </button>
    
    <ul class="vars" id="variableList">
    </ul>

    <br>
    
    <label>Enter Constraints</label><br>
    <input class="nlp" type="text" id="consInput"
           placeholder="Example: -1 -2 G" oninput="checkConstraint(); return false"> 
    <button type="button" onclick="newConstraint()" class="nlp" id="addBtn"> 
        <img src="assets/img/plus.png">
    </button>
    
    <ul class="cons" id="constraintList">
    </ul>
    
    <br>
    
    <label>Enter Objective Function</label><br>
    <input class="nlp" type="text" id="objInput"
           placeholder="Example: 1 -2 Max" oninput="checkObjective(); return false"> 
    <button type="button" onclick="newObjective()" class="nlp" id="addObj"> 
        <img src="assets/img/plus.png">
    </button>
    
    <ul class="cons" id="objectiveList">
    </ul>
    
    <br><br>

    <button type="button" onclick="calculate()" class="nlp" id="calcBtn">
        Calculate
    </button>

    <br><br>
    
    <label class="nlp" id="resultLabel">Result:</label>
    
    <br><br>
    
    <label class="nlp" id="errorLabel">Error Messages:</label>
    
    <br>
    
    <label class="nlp" id="errorMsg"></label>

</div>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.6.1/pikaday.min.js"></script>
    <script src="assets/js/nlp.js"></script>
    <script src="assets/js/require.js"></script>
    <script src="assets/js/theme.js"></script>
</body>

</html>
